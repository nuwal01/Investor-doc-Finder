<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results — Investor Doc Finder</title>
    <meta name="description" content="Search results for investor documents, SEC filings, and earnings reports.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">

    <nav class="navbar">
        <div class="logo"><a href="index.html">Investor Doc Finder</a></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item auth-required hidden" style="display:none;">Dashboard</a>
            <a href="login.html" id="loginBtn" class="nav-item btn-primary">Login</a>
            <button id="logoutBtn" class="nav-item btn-secondary hidden" style="display:none;">Logout</button>
        </div>
    </nav>

    <div class="results-header">
        <div class="search-container">
            <form id="searchForm" autocomplete="off">
                <div class="search-input-wrapper">
                    <input type="text" id="searchInput" name="q" placeholder="Search another query..." required>
                    <button type="submit" class="search-btn" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </form>
            <div id="autocompleteResults" class="autocomplete-dropdown hidden"></div>
        </div>
    </div>

    <main class="container">
        <div class="results-info">
            <h2 id="searchTitle">Searching…</h2>
            <p id="resultCount"></p>
        </div>

        <div id="loadingIndicator" class="results-loader">
            <div class="loader"></div>
            <p style="margin-top:1rem;color:var(--text-muted);">Fetching official company documents…</p>
        </div>

        <div id="resultsGrid" class="results-grid hidden">
            <!-- Results populated by JS -->
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/companies.js"></script>
    <script src="js/app.js"></script>
    <script src="js/firestore.js"></script>
    <script src="js/autocomplete.js"></script>
    <script src="js/download.js"></script>
    <script src="js/search.js"></script>
</body>

</html>
